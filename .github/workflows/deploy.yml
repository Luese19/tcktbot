name: Deploy - Production Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  pre-deploy-checks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest pytest-cov

    - name: Run all tests
      run: |
        python verify_setup.py
        python test_schedule.py

    - name: Build Docker image
      run: |
        docker build -t ticketingbot:latest .

  require-approval:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Check for required approvals
      run: |
        echo "⚠️  This PR requires at least 1 approval from team members"
        echo "✅ Once approved, it can be merged to production (main)"

  deploy:
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deployment notification
      run: |
        echo "🚀 DEPLOYING TO PRODUCTION"
        echo "Branch: ${{ github.ref }}"
        echo "Commit: ${{ github.sha }}"
        echo "By: ${{ github.actor }}"
        echo ""
        echo "✅ All tests passed"
        echo "✅ Docker image built successfully"
        echo "✅ Ready for deployment"

    - name: Deploy (Update your deployment step here)
      run: |
        echo "Add your deployment commands here:"
        echo "  - Push Docker image to registry"
        echo "  - Update production environment"
        echo "  - Run database migrations (if needed)"
        echo "  - Health checks"
